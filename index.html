<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストップウォッチ & カウンター</title>
  <link rel="icon" href="icon.png">
  <style>
    :root {
      --bg: #121212;
      --text: #ffffff;
      --btn: #333333;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    h1 { margin-bottom: 10px; }

    .container { text-align: center; }

    button {
      margin: 5px;
      padding: 10px 20px;
      border: none;
      background: var(--btn);
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    .time, .counter {
      font-size: 2em;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⏱ ストップウォッチ</h1>
    <div class="time" id="time">00:00:00.00</div>
    <button onclick="start()">開始</button>
    <button onclick="stop()">停止</button>
    <button onclick="reset()">リセット</button>

    <h1>🔢 カウンター</h1>
    <div class="counter" id="counter">0</div>
    <button onclick="increment()">＋</button>
    <button onclick="decrement()">－</button>
    <button onclick="resetCounter()">リセット</button>
  </div>

  <script>
    // ===== ストップウォッチ =====
    let timer = null;
    let startTime = 0;
    let elapsed = 0;

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const s = String(totalSeconds % 60).padStart(2, '0');
      const cs = String(Math.floor((ms % 1000) / 10)).padStart(2, '0'); // コンマ秒
      return `${h}:${m}:${s}.${cs}`;
    }

    function updateDisplay() {
      const now = Date.now();
      const current = elapsed + (timer ? now - startTime : 0);
      document.getElementById('time').textContent = formatTime(current);
      localStorage.setItem('stopwatch', current);
    }

    function start() {
      if (timer) return;
      startTime = Date.now();
      timer = setInterval(updateDisplay, 10);
    }

    function stop() {
      if (!timer) return;
      elapsed += Date.now() - startTime;
      clearInterval(timer);
      timer = null;
      localStorage.setItem('stopwatch', elapsed);
    }

    function reset() {
      clearInterval(timer);
      timer = null;
      elapsed = 0;
      document.getElementById('time').textContent = "00:00:00.00";
      localStorage.setItem('stopwatch', 0);
    }

    // ===== カウンター =====
    let count = Number(localStorage.getItem('counter')) || 0;

    function updateCounter() {
      document.getElementById('counter').textContent = count;
      localStorage.setItem('counter', count);
    }

    function increment() {
      count++;
      updateCounter();
    }

    function decrement() {
      count--;
      updateCounter();
    }

    function resetCounter() {
      count = 0;
      updateCounter();
    }

    // ===== 初期化（リロード対応） =====
    window.onload = () => {
      const savedTime = Number(localStorage.getItem('stopwatch')) || 0;
      elapsed = savedTime;
      document.getElementById('time').textContent = formatTime(savedTime);
      updateCounter();
    };
  </script>
</body>
</html>
