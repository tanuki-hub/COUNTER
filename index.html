<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統合ストップウォッチ & カウンター</title>
<link rel="icon" href="icon.png">
<style>
:root {
  --bg:#121212; --text:#fff; --btn:#333;
}

body.light {
  --bg:#ffffff;
  --text:#000000;
  --btn:#e0e0e0;
}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:sans-serif;
  display:flex; justify-content:center; align-items:center;
  height:100vh;
}
.container{
  width:90vw; max-width:600px; text-align:center;
}
.display{
  font-size:clamp(4rem,12vw,7rem);
  margin:20px 0;
}
button{
  font-size:clamp(1rem,3vw,1.5rem);
  padding:15px 20px;
  margin:8px;
  border:none; border-radius:12px;
  background:var(--btn); color:#fff;
}
</style>
</head>
<body>
<div class="container">
  <div class="display" id="time">00:00:00.00</div>
  <div class="display" id="counter">0</div>

  <div>
    <button onclick="toggle()">▶ / ⏸</button>
    <button onclick="increment()">＋</button>
    <button onclick="decrement()">－</button>
    <button onclick="resetAll()">リセット</button>
  </div>
</div>

<script>
// ===== 時間（実時間ベース） =====
let running=false;
let startTime=0;
let baseElapsed=Number(localStorage.getItem('time'))||0;

function now(){ return Date.now(); }

function format(ms){
  const s=Math.floor(ms/1000);
  const h=String(Math.floor(s/3600)).padStart(2,'0');
  const m=String(Math.floor((s%3600)/60)).padStart(2,'0');
  const sec=String(s%60).padStart(2,'0');
  const cs=String(Math.floor((ms%1000)/10)).padStart(2,'0');
  return `${h}:${m}:${sec}.${cs}`;
}

function update(){
  const elapsed = running ? baseElapsed + (now()-startTime) : baseElapsed;
  document.getElementById('time').textContent = format(elapsed);
  localStorage.setItem('time', elapsed);

  // 10分(600000ms)超えたらライトモード
  if(elapsed >= 600000){
    document.body.classList.add('light');
  }
}

function toggle(){
  if(running){
    baseElapsed += now()-startTime;
    running=false;
  }else{
    startTime=now();
    running=true;
  }
}

// ===== カウンター =====
let count=Number(localStorage.getItem('count'))||0;

function updateCounter(){
  document.getElementById('counter').textContent=count;
  localStorage.setItem('count',count);
}

function increment(){ count++; updateCounter(); }
function decrement(){ count--; updateCounter(); }

// ===== リセット =====
function resetAll(){
  running=false;
  baseElapsed=0;
  count=0;
  localStorage.setItem('time',0);
  localStorage.setItem('count',0);
  document.body.classList.remove('light');
  update(); updateCounter();
}

// ===== 初期化 =====
setInterval(update,10);
window.onload=()=>{
  update(); updateCounter();
};
</script>
</body>
</html>
